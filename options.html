<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki Word Adder - 設定</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1::before {
      content: "A";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #4a90d9;
      color: white;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    .section {
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid #eee;
    }

    .section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 12px;
      color: #666;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
      background: #fff;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #fafafa;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .checkbox-field:hover {
      background: #f0f0f0;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4a90d9;
    }

    .checkbox-field label {
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    .save-btn {
      width: 100%;
      padding: 12px 20px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 24px;
    }

    .save-btn:hover {
      background: #3a7bc8;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.error {
      display: block;
      background: #fce4ec;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>設定</h1>
    <p class="subtitle">Anki Word Adderの動作をカスタマイズ</p>

    <div class="section">
      <div class="section-title">デフォルト設定</div>

      <div class="field">
        <label for="defaultDeck">デフォルトデッキ</label>
        <input type="text" id="defaultDeck" placeholder="Default">
        <div class="help-text">新しい単語を追加する際のデフォルトデッキ名</div>
      </div>

      <div class="field">
        <label for="defaultModel">デフォルトノートタイプ</label>
        <input type="text" id="defaultModel" placeholder="Basic">
        <div class="help-text">新しい単語を追加する際のデフォルトノートタイプ</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">機能設定</div>

      <div class="field">
        <div class="checkbox-field">
          <input type="checkbox" id="autoTranslate" checked>
          <label for="autoTranslate">
            自動翻訳を有効にする
            <div class="help-text">単語選択時に自動的に翻訳を取得します</div>
          </label>
        </div>
      </div>

      <div class="field">
        <div class="checkbox-field">
          <input type="checkbox" id="autoSpeak">
          <label for="autoSpeak">
            モーダル表示時に自動発音
            <div class="help-text">モーダルを開いた際に自動的に単語を読み上げます</div>
          </label>
        </div>
      </div>

      <div class="field">
        <div class="checkbox-field">
          <input type="checkbox" id="highlightWord" checked>
          <label for="highlightWord">
            文脈内の単語をハイライト
            <div class="help-text">Ankiカードで文脈内の単語を太字で表示します</div>
          </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">外観</div>

      <div class="field">
        <div class="checkbox-field">
          <input type="checkbox" id="darkMode">
          <label for="darkMode">
            ダークモード（開発中）
            <div class="help-text">モーダルをダークテーマで表示します</div>
          </label>
        </div>
      </div>
    </div>

    <button class="save-btn" id="saveBtn">保存</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
